{% load static %}
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-LN+7fdVzj6u52u30Kp6M/trliBMCMKTyK833zpbD+pXdCLuTusPj697FH4R/5mcr"
      crossorigin="anonymous"
    />
    <link
      href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href={% static 'style4.css' %}>
  </head>
  <body>
    <div class="main-sctn">
      <div class="navbar-a">
        <div class="logo-1">
          <b>JOB PORTAL</b>
        </div>
        <div class="nav-bar-items-1">
          <ul class="outer-menu-1">
            <li class="nav-items"><a class="nav-link" href="/">Home</a></li>
            <li class="nav-items">
              <a class="nav-link" href="/job listings">Job Listings</a>
            </li>
            <li class="nav-items">
              <a class="nav-link" href="/contact us">Contact Us</a>
            </li>
          </ul>
        </div>
        <div class="txt-bar">
         
          <ul>
            <li class="nav-items">
              <a class="nav-link" href="/log in">Log in</a>
            </li>
          </ul>
        </div>
      </div>
    </div>
    <div class="log">
      <form action="/usersubmit" method="POST">
        {% csrf_token %}
        <h1>Login</h1>
        <div class="log1">
          <input type="text" id="name" name="username" placeholder="Username" />
          <i class="bx bxs-user"></i>
        </div>
        <div class="log1">
          <input
            type="password"
            id="password"
            name="password"
            placeholder="password"
          />
          <i class="bx bxs-lock-alt"></i>
        </div>
        <div class="log3">
          <label><input type="checkbox" />Remember me</label>
          <a href="#"> Forget password?</a>
        </div>

        <button type="submit" class="btn">Login</button>

        <div class="log4">
          <p>Don't have an account?<a href="#">Register</a></p>
        </div>
      </form>
    </div>

    <!-- {% include 'footer.html' %} -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-ndDqU0Gzau9qJ1lfW4pNLlhNTkCfHzAVBReH9diLvGRem5+R9g2FzA8ZGN954O5Q"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
